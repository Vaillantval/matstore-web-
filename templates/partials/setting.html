<div class="store_info">
    {% if site_name %}
    <div class="store_logo">
        {% if site_logo %}<img src="{{ site_logo.url }}" alt="{{ site_name }}">{% endif %}
    </div>
    <div class="store_details">
        <h3>{{ site_name }}</h3>
        <p>{{ site_description }}</p>
        <ul class="list_none store_contact">
            <li><i class="icon-location-pin"></i> {{ site_street }}, {{ site_city }}, {{ site_state }} {{ site_code_postal }}</li>
            <li><i class="icon-phone"></i> {{ site_phone }}</li>
            <li><i class="icon-envelope"></i> {{ site_email }}</li>
        </ul>
        <p><strong>Currency:</strong> {{ site_currency }}</p>
    </div>
    {% endif %}
</div>
