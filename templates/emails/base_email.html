<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MatStore Haiti{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:30px 10px;">

        <table width="600" cellpadding="0" cellspacing="0" border="0"
               style="max-width:600px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- En-tête -->
          <tr>
            <td style="background-color:#e63946;padding:28px 40px;text-align:center;">
              <p style="margin:0;font-size:24px;font-weight:bold;color:#ffffff;letter-spacing:1px;">
                MatStore Haiti
              </p>
              <p style="margin:6px 0 0;font-size:12px;color:#ffd6d8;letter-spacing:2px;text-transform:uppercase;">
                Votre boutique en ligne
              </p>
            </td>
          </tr>

          <!-- Corps -->
          <tr>
            <td style="padding:36px 40px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Pied de page -->
          <tr>
            <td style="background-color:#f9f9f9;padding:20px 40px;text-align:center;border-top:1px solid #eeeeee;">
              <p style="margin:0;font-size:12px;color:#aaaaaa;line-height:1.8;">
                &copy; MatStore Haiti 2026 &nbsp;|&nbsp;
                <a href="{{ site_url }}" style="color:#e63946;text-decoration:none;">matstorehaiti.online</a>
                &nbsp;|&nbsp;
                <a href="{{ site_url }}/desinscription/" style="color:#aaaaaa;text-decoration:none;">Se désabonner</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
