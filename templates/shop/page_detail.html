{% extends "base.html" %}
{% load static %}

{% block styles %}
<style>
    .page_banner {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 80px 0 60px;
    }
    .page_banner h1 { font-size: 42px; font-weight: 700; color: #1a1a2e; }
    .page_banner p { font-size: 17px; color: #6c757d; margin-top: 10px; }
    .page_banner .breadcrumb-item a { color: #ff5722; }

    .page_body {
        background: #fff;
        border-radius: 16px;
        padding: 50px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        border: 1px solid #f0f0f0;
        font-size: 16px;
        line-height: 1.9;
        color: #495057;
    }
    .page_body h1,.page_body h2,.page_body h3,.page_body h4 { color: #1a1a2e; margin-top: 1.5rem; margin-bottom: .75rem; }
    .page_body img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
    .page_body a { color: #ff5722; }
    .page_body blockquote {
        border-left: 4px solid #ff5722;
        margin: 20px 0;
        padding: 15px 20px;
        background: rgba(255,87,34,0.04);
        border-radius: 0 8px 8px 0;
        color: #6c757d;
    }
    .page_banner_img {
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 40px;
        max-height: 400px;
    }
    .page_banner_img img { width: 100%; height: 400px; object-fit: cover; }
</style>
{% endblock %}

{% block content %}

<div class="page_banner">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'home' %}">Accueil</a></li>
                <li class="breadcrumb-item active">{{ page.name }}</li>
            </ol>
        </nav>
        <h1>{{ page.name }}</h1>
        {% if page.subtitle %}<p>{{ page.subtitle }}</p>{% endif %}
    </div>
</div>

<section class="section py-5">
    <div class="container">
        {% if page.image %}
        <div class="page_banner_img">
            <img src="{{ page.image.url }}" alt="{{ page.name }}">
        </div>
        {% endif %}
        <div class="page_body">
            {{ page.content|linebreaks }}
        </div>
    </div>
</section>

{% endblock %}
